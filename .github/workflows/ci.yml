name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests ────────────────────────────────────────────────────────────────
  # Fast (<5 min). Required to pass on every push.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-unit-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-unit-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-unit-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Check formatting
        run: zig fmt --check src/ build.zig

      - name: Run unit tests
        run: zig build test --summary all

  # ── Integration tests ─────────────────────────────────────────────────────────
  # Slow to compile (~45-60 min cold on a 2-core runner). Runs on push to main
  # only (not PRs). Does not block the required test job.
  # The first cold-cache run will hit the timeout; subsequent runs use the
  # saved cache and complete in a few minutes.
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-integration-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-integration-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-integration-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Run integration tests
        run: zig build test-integration --summary all

  # ── Linux release builds ─────────────────────────────────────────────────────
  build-linux-release:
    name: Build Linux release (${{ matrix.archive_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: tardigrade-linux-x86_64
          - os: ubuntu-24.04-arm
            archive_name: tardigrade-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-release-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Build Linux release binary
        run: zig build -Doptimize=ReleaseFast -Dversion=ci
