name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format ────────────────────────────────────────────────────────────────────
  # Fast source formatting check. Required on every PR and push.
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Check formatting
        run: zig fmt --check build.zig src/ tests/

  # ── Lint ──────────────────────────────────────────────────────────────────────
  # Workflow syntax and shell script linting.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

      - name: Run shellcheck
        run: find scripts/ packaging/ -name "*.sh" -exec shellcheck {} +

  # ── Unit tests ────────────────────────────────────────────────────────────────
  # Runs unit tests across platforms. Required on every PR and push.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libssl-dev

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-test-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Run unit tests
        run: zig build test --summary all --error-style verbose

  # ── Build validation ──────────────────────────────────────────────────────────
  # Validates Debug, ReleaseSafe, and ReleaseFast builds across platforms.
  # Debug catches assertion failures; ReleaseSafe catches safety-check panics;
  # ReleaseFast confirms production artifact parity.
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.optimize }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14]
        optimize: [Debug, ReleaseSafe, ReleaseFast]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libssl-dev

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-build-${{ matrix.optimize }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-build-${{ matrix.optimize }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-build-${{ matrix.optimize }}-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Build (${{ matrix.optimize }})
        env:
          OPTIMIZE: ${{ matrix.optimize }}
        run: zig build "-Doptimize=$OPTIMIZE"

  # ── HTTP/3 build validation ─────────────────────────────────────────────────
  # Exercises the optional ngtcp2/nghttp3 build path with explicit system
  # libraries on Linux. This keeps the feature build reproducible without
  # making the default matrix depend on optional packages.
  http3-build:
    name: HTTP/3 build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libnghttp3-dev libngtcp2-dev libngtcp2-crypto-ossl-dev

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-http3-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-http3-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-http3-build-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Build with HTTP/3 enabled
        run: zig build -Denable-http3-ngtcp2=true --summary all

  # ── Packaging smoke ─────────────────────────────────────────────────────────
  # Verifies the release archive layout, install script behavior, and host-native
  # DEB package layout against a disposable Ubuntu container.
  packaging-smoke:
    name: Packaging smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-packaging-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-packaging-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-packaging-${{ runner.os }}-${{ runner.arch }}-

      - name: Build ReleaseFast binary
        run: zig build -Doptimize=ReleaseFast

      - name: Smoke test install script
        run: ./scripts/test-install.sh

      - name: Smoke test DEB package
        run: ./scripts/test-deb-package.sh

      - name: Smoke test RPM package
        run: ./scripts/test-rpm-package.sh

  # ── Performance smoke ────────────────────────────────────────────────────────
  # Shared-runner loopback benchmark with conservative floors and a 30s default
  # run per scenario. This is not a release benchmark; it exists only to catch
  # obvious regressions without making PRs noisy or flaky.
  perf-smoke:
    name: Perf smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev wrk

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-perf-smoke-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-perf-smoke-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-perf-smoke-${{ runner.os }}-${{ runner.arch }}-

      - name: Build ReleaseFast binary
        run: zig build -Doptimize=ReleaseFast

      - name: Run performance smoke benchmark
        run: ./benchmarks/ci-smoke.sh --save benchmarks/results/ci-smoke.json

      - name: Stage perf smoke artifact
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/perf-artifacts"
          cp benchmarks/results/ci-smoke.json "$RUNNER_TEMP/perf-artifacts/ci-smoke.json"

      - name: Upload perf smoke results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perf-smoke-results
          path: ${{ runner.temp }}/perf-artifacts/ci-smoke.json
          if-no-files-found: error
          retention-days: 7

  # ── Security scanning ─────────────────────────────────────────────────────────
  # Secret detection, filesystem vulnerability scanning, and GitHub Actions
  # hardening checks. Results are uploaded to the Security tab as SARIF.
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Secret scanning
        run: gitleaks detect --source . --config .gitleaks.toml --log-level warn

      - name: Filesystem vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: GitHub Actions hardening
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency review (PRs only) ──────────────────────────────────────────────
  # Flags new dependency additions or removals in pull requests.
  # Requires the Dependency Graph feature enabled under Settings → Security.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  # ── Integration tests ─────────────────────────────────────────────────────────
  # Runs on push to main only (not PRs). Failures block the workflow.
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-integration-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-integration-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-integration-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Run integration tests
        run: zig build test-integration --summary all
