name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format ────────────────────────────────────────────────────────────────────
  # Fast source formatting check. Required on every PR and push.
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Check formatting
        run: zig fmt --check build.zig src/ tests/

  # ── Lint ──────────────────────────────────────────────────────────────────────
  # Workflow syntax, shell scripts, and Dockerfile linting.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run actionlint
        uses: rhysd/actionlint@a443f344ff32813837fa49f7aa6cbc478d770e62 # v1.7.9

      - name: Run shellcheck
        run: find scripts/ -name "*.sh" -exec shellcheck {} +

      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  # ── Unit tests ────────────────────────────────────────────────────────────────
  # Runs unit tests across platforms. Required on every PR and push.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install-deps: sudo apt-get install -y libssl-dev
          - os: ubuntu-24.04-arm
            install-deps: sudo apt-get install -y libssl-dev
          - os: macos-14
            install-deps: ""

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install system dependencies
        if: matrix.install-deps != ''
        run: ${{ matrix.install-deps }}

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-test-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Run unit tests
        run: zig build test --summary all --error-style verbose

  # ── Build validation ──────────────────────────────────────────────────────────
  # Validates Debug, ReleaseSafe, and ReleaseFast builds across platforms.
  # Debug catches assertion failures; ReleaseSafe catches safety-check panics;
  # ReleaseFast confirms production artifact parity.
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.optimize }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14]
        optimize: [Debug, ReleaseSafe, ReleaseFast]

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libssl-dev

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-build-${{ matrix.optimize }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-build-${{ matrix.optimize }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-build-${{ matrix.optimize }}-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Build (${{ matrix.optimize }})
        run: zig build -Doptimize=${{ matrix.optimize }}

  # ── Performance smoke ────────────────────────────────────────────────────────
  # Shared-runner loopback benchmark with conservative floors and a 30s default
  # run per scenario. This is not a release benchmark; it exists only to catch
  # obvious regressions without making PRs noisy or flaky.
  perf-smoke:
    name: Perf smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev wrk

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-perf-smoke-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-perf-smoke-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-perf-smoke-${{ runner.os }}-${{ runner.arch }}-

      - name: Build ReleaseFast binary
        run: zig build -Doptimize=ReleaseFast

      - name: Run performance smoke benchmark
        run: ./benchmarks/ci-smoke.sh --save benchmarks/results/ci-smoke.json

      - name: Upload perf smoke results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perf-smoke-results
          path: benchmarks/results/ci-smoke.json
          if-no-files-found: error

  # ── Security scanning ─────────────────────────────────────────────────────────
  # Secret detection, filesystem vulnerability scanning, and GitHub Actions
  # hardening checks. Results are uploaded to the Security tab as SARIF.
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Secret scanning
        run: gitleaks detect --source . --config .gitleaks.toml --log-level warn

      - name: Filesystem vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: GitHub Actions hardening
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency review (PRs only) ──────────────────────────────────────────────
  # Flags new dependency additions or removals in pull requests.
  # Requires the Dependency Graph feature enabled under Settings → Security.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  # ── Integration tests ─────────────────────────────────────────────────────────
  # Slow to compile (~45–60 min cold on a 2-core runner). Runs on push to main
  # only (not PRs). Does not block the required jobs.
  # The first cold-cache run will hit the timeout; subsequent runs use the
  # saved cache and complete in a few minutes.
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-integration-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-integration-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-integration-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Run integration tests
        run: zig build test-integration --summary all
