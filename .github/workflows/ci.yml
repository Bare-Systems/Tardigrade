name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.14.1

      - name: Check formatting
        run: zig fmt --check src/ build.zig

      - name: Run unit tests
        run: zig build test

      - name: Run integration tests
        run: zig build test-integration

  build-linux-release:
    name: Build Linux release (${{ matrix.archive_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: tardigrade-linux-x86_64
          - os: ubuntu-24.04-arm
            archive_name: tardigrade-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.14.1

      - name: Build Linux release binary
        run: zig build -Doptimize=ReleaseFast -Dversion=ci
