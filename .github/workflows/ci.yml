name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.14.1

      - name: Run unit tests
        run: zig build test

      - name: Run integration tests
        run: zig build test-integration
