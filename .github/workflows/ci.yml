name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Check formatting
        run: zig fmt --check src/ build.zig

      - name: Run unit tests
        run: zig build test --summary all

      - name: Run integration tests
        run: zig build test-integration --summary all

  build-linux-release:
    name: Build Linux release (${{ matrix.archive_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: tardigrade-linux-x86_64
          - os: ubuntu-24.04-arm
            archive_name: tardigrade-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-${{ github.sha }}
          restore-keys: |
            zig-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig') }}-
            zig-${{ runner.os }}-${{ runner.arch }}-

      - name: Print Zig version
        run: zig version

      - name: Build Linux release binary
        run: zig build -Doptimize=ReleaseFast -Dversion=ci
