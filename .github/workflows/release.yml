name: Release Tardigrade

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      should_publish: ${{ steps.meta.outputs.should_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(./scripts/release-metadata.sh version)"
          tag="$(./scripts/release-metadata.sh tag)"
          current_sha="${GITHUB_SHA}"
          should_publish="true"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "$tag")"
            if [ "$tag_commit" != "$current_sha" ]; then
              should_publish="false"
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" "$current_sha" -m "Tardigrade $tag"
            git push origin "$tag"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"

  build-release:
    name: Build ${{ matrix.archive_name }}
    needs: prepare-release
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: tardigrade-linux-x86_64
          - os: ubuntu-24.04-arm
            archive_name: tardigrade-linux-aarch64
          - os: macos-13
            archive_name: tardigrade-darwin-x86_64
          - os: macos-14
            archive_name: tardigrade-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.14.1

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast -Dversion=${{ needs.prepare-release.outputs.version }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp zig-out/bin/tardigrade dist/tardigrade
          ln -sf tardigrade dist/tardi
          cp LICENSE dist/LICENSE
          tar -C dist -czf "${{ matrix.archive_name }}.tar.gz" tardigrade tardi LICENSE

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release assets
    needs:
      - prepare-release
      - build-release
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f -name '*.tar.gz' -print0 | sort -z | xargs -0 shasum -a 256 > dist/tardigrade-checksums.txt

      - name: Generate release notes
        run: ./scripts/release-metadata.sh notes > release-notes.md

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: Tardigrade ${{ needs.prepare-release.outputs.tag }}
          body_path: release-notes.md
          files: |
            dist/*/*.tar.gz
            dist/tardigrade-checksums.txt
          fail_on_unmatched_files: true
