name: Release Tardigrade

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # ── Prepare release ─────────────────────────────────────────────────────────
  # Skipped if triggered by workflow_run and CI did not succeed, ensuring
  # releases are never cut from a failing main.
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      should_publish: ${{ steps.meta.outputs.should_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(./scripts/release-metadata.sh version)"
          tag="$(./scripts/release-metadata.sh tag)"
          current_sha="${GITHUB_SHA}"
          should_publish="true"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "$tag")"
            if [ "$tag_commit" != "$current_sha" ]; then
              should_publish="false"
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" "$current_sha" -m "Tardigrade $tag"
            git push origin "$tag"
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "should_publish=$should_publish"
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          mkdir -p "$RUNNER_TEMP/release-notes"
          ./scripts/release-metadata.sh notes > "$RUNNER_TEMP/release-notes/release-notes.md"

      - name: Upload release notes
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-notes
          path: ${{ runner.temp }}/release-notes/release-notes.md
          if-no-files-found: error
          retention-days: 1

  build-release:
    name: Build ${{ matrix.archive_name }}
    needs: prepare-release
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: tardigrade-linux-x86_64
            deb_arch: amd64
            rpm_arch: x86_64
          - os: ubuntu-24.04-arm
            archive_name: tardigrade-linux-aarch64
            deb_arch: arm64
            rpm_arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Verify checkout is clean
        run: |
          git diff --exit-code
          git diff --cached --exit-code

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev

      - name: Install packaging prerequisites
        run: sudo apt-get install -y rpm

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Print Zig version
        run: zig version

      - name: Prepare archive artifact paths
        id: archive_artifacts
        env:
          ARCHIVE_NAME: ${{ matrix.archive_name }}
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/release-artifacts/$ARCHIVE_NAME"
          mkdir -p "$artifact_dir"
          {
            echo "artifact_dir=$artifact_dir"
            echo "archive_path=$artifact_dir/$ARCHIVE_NAME.tar.gz"
            echo "sbom_path=$artifact_dir/sbom-$ARCHIVE_NAME.spdx.json"
            echo "inventory_path=$artifact_dir/dependency-inventory-$ARCHIVE_NAME.json"
          } >> "$GITHUB_OUTPUT"

      - name: Source and configuration audit
        run: ./scripts/audit-dependencies.sh

      - name: Build release binary
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: zig build -Doptimize=ReleaseFast "-Dversion=$VERSION"

      - name: Audit release binary linkage and record inventory
        env:
          INVENTORY_PATH: ${{ steps.archive_artifacts.outputs.inventory_path }}
        run: |
          ./scripts/audit-release-binary.sh \
            --binary zig-out/bin/tardi \
            --profile general \
            --output "$INVENTORY_PATH"

      - name: Package artifact
        env:
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          ARTIFACT_DIR: ${{ steps.archive_artifacts.outputs.artifact_dir }}
        run: |
          ./scripts/package-release-archive.sh \
            --archive-name "$ARCHIVE_NAME" \
            --binary zig-out/bin/tardi \
            --staging-dir dist \
            --output-dir "$ARTIFACT_DIR"

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          path: ${{ steps.archive_artifacts.outputs.artifact_dir }}
          artifact-name: sbom-${{ matrix.archive_name }}.spdx.json
          format: spdx-json
          output-file: ${{ steps.archive_artifacts.outputs.sbom_path }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.archive_artifacts.outputs.archive_path }}

      - name: Build DEB package
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          DEB_ARCH: ${{ matrix.deb_arch }}
          ARTIFACT_DIR: ${{ steps.archive_artifacts.outputs.artifact_dir }}
        run: |
          ./packaging/deb/build.sh \
            --version "$VERSION" \
            --arch "$DEB_ARCH" \
            --binary zig-out/bin/tardi \
            --output "$ARTIFACT_DIR"

      - name: Build RPM package
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          RPM_ARCH: ${{ matrix.rpm_arch }}
          ARTIFACT_DIR: ${{ steps.archive_artifacts.outputs.artifact_dir }}
        run: |
          ./packaging/rpm/build.sh \
            --version "$VERSION" \
            --arch "$RPM_ARCH" \
            --binary zig-out/bin/tardi \
            --output "$ARTIFACT_DIR"

      - name: Upload archive artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ steps.archive_artifacts.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 1

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ matrix.archive_name }}
          path: ${{ steps.archive_artifacts.outputs.sbom_path }}
          if-no-files-found: error
          retention-days: 1

      - name: Upload dependency inventory artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dependency-inventory-${{ matrix.archive_name }}
          path: ${{ steps.archive_artifacts.outputs.inventory_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload DEB artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-${{ matrix.archive_name }}
          path: ${{ steps.archive_artifacts.outputs.artifact_dir }}/*.deb
          if-no-files-found: error
          retention-days: 1

      - name: Upload RPM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-${{ matrix.archive_name }}
          path: ${{ steps.archive_artifacts.outputs.artifact_dir }}/*.rpm
          if-no-files-found: error
          retention-days: 1

  publish-release:
    name: Publish GitHub release assets
    needs:
      - prepare-release
      - build-release
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download release notes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-notes
          path: ${{ runner.temp }}/publish-release/release-notes

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/publish-release/dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        env:
          DIST_DIR: ${{ runner.temp }}/publish-release/dist
        run: |
          set -euo pipefail
          mkdir -p "$DIST_DIR"
          install -m 0755 scripts/install.sh "$DIST_DIR/install.sh"
          find "$DIST_DIR" -type f \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' -o -name 'install.sh' \) -print0 | sort -z | xargs -0 sha256sum > "$DIST_DIR/tardigrade-checksums.txt"

      - name: Verify checksums
        env:
          CHECKSUMS_PATH: ${{ runner.temp }}/publish-release/dist/tardigrade-checksums.txt
        run: sha256sum --check "$CHECKSUMS_PATH"

      - name: Scan release archives for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ runner.temp }}/publish-release/dist/
          format: table
          severity: CRITICAL
          exit-code: 0

      - name: Publish release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: Tardigrade ${{ needs.prepare-release.outputs.tag }}
          body_path: ${{ runner.temp }}/publish-release/release-notes/release-notes.md
          files: |
            ${{ runner.temp }}/publish-release/dist/*.tar.gz
            ${{ runner.temp }}/publish-release/dist/*.deb
            ${{ runner.temp }}/publish-release/dist/*.rpm
            ${{ runner.temp }}/publish-release/dist/*.spdx.json
            ${{ runner.temp }}/publish-release/dist/dependency-inventory-*.json
            ${{ runner.temp }}/publish-release/dist/install.sh
            ${{ runner.temp }}/publish-release/dist/tardigrade-checksums.txt
          fail_on_unmatched_files: true
