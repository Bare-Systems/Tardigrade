name: Release Tardigrade

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # ── Prepare release ─────────────────────────────────────────────────────────
  # Skipped if triggered by workflow_run and CI did not succeed, ensuring
  # releases are never cut from a failing main.
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      should_publish: ${{ steps.meta.outputs.should_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(./scripts/release-metadata.sh version)"
          tag="$(./scripts/release-metadata.sh tag)"
          current_sha="${GITHUB_SHA}"
          should_publish="true"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "$tag")"
            if [ "$tag_commit" != "$current_sha" ]; then
              should_publish="false"
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" "$current_sha" -m "Tardigrade $tag"
            git push origin "$tag"
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "should_publish=$should_publish"
          } >> "$GITHUB_OUTPUT"

  build-release:
    name: Build ${{ matrix.archive_name }}
    needs: prepare-release
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: tardigrade-linux-x86_64
          - os: ubuntu-24.04-arm
            archive_name: tardigrade-linux-aarch64
          - os: macos-13
            archive_name: tardigrade-darwin-x86_64
          - os: macos-14
            archive_name: tardigrade-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Print Zig version
        run: zig version

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast -Dversion=${{ needs.prepare-release.outputs.version }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp zig-out/bin/tardigrade dist/tardigrade
          ln -sf tardigrade dist/tardi
          cp LICENSE dist/LICENSE
          tar -C dist -czf "${{ matrix.archive_name }}.tar.gz" tardigrade tardi LICENSE

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          path: dist/
          artifact-name: sbom-${{ matrix.archive_name }}.spdx.json
          format: spdx-json
          output-file: sbom-${{ matrix.archive_name }}.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ matrix.archive_name }}.tar.gz

      - name: Upload archive artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}.tar.gz
          if-no-files-found: error

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ matrix.archive_name }}
          path: sbom-${{ matrix.archive_name }}.spdx.json
          if-no-files-found: error

  build-deb:
    name: Build DEB packages
    needs:
      - prepare-release
      - build-release
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            artifact: tardigrade-linux-x86_64
          - arch: arm64
            artifact: tardigrade-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download binary artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact

      - name: Extract binary
        run: |
          tar -xzf artifact/${{ matrix.artifact }}.tar.gz
          chmod +x tardigrade

      - name: Build DEB
        run: |
          mkdir -p zig-out/bin
          cp tardigrade zig-out/bin/tardigrade
          ./packaging/deb/build.sh \
            --version ${{ needs.prepare-release.outputs.version }} \
            --arch ${{ matrix.arch }} \
            --binary zig-out/bin/tardigrade

      - name: Generate DEB SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          path: dist/
          artifact-name: sbom-tardigrade_${{ needs.prepare-release.outputs.version }}_${{ matrix.arch }}.spdx.json
          format: spdx-json
          output-file: sbom-tardigrade_${{ needs.prepare-release.outputs.version }}_${{ matrix.arch }}.spdx.json

      - name: Upload DEB artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tardigrade_${{ needs.prepare-release.outputs.version }}_${{ matrix.arch }}.deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Upload DEB SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-tardigrade_${{ needs.prepare-release.outputs.version }}_${{ matrix.arch }}
          path: sbom-tardigrade_${{ needs.prepare-release.outputs.version }}_${{ matrix.arch }}.spdx.json
          if-no-files-found: error

  build-rpm:
    name: Build RPM packages
    needs:
      - prepare-release
      - build-release
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            artifact: tardigrade-linux-x86_64
          - arch: arm64
            artifact: tardigrade-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install rpm-build
        run: sudo apt-get install -y rpm-build

      - name: Download binary artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact

      - name: Extract binary
        run: |
          tar -xzf artifact/${{ matrix.artifact }}.tar.gz
          chmod +x tardigrade

      - name: Build RPM
        run: |
          mkdir -p zig-out/bin
          cp tardigrade zig-out/bin/tardigrade
          ./packaging/rpm/build.sh \
            --version ${{ needs.prepare-release.outputs.version }} \
            --arch ${{ matrix.arch }} \
            --binary zig-out/bin/tardigrade

      - name: Generate RPM SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          path: dist/
          artifact-name: sbom-tardigrade-${{ needs.prepare-release.outputs.version }}-${{ matrix.arch }}.rpm.spdx.json
          format: spdx-json
          output-file: sbom-tardigrade-${{ needs.prepare-release.outputs.version }}-${{ matrix.arch }}.rpm.spdx.json

      - name: Upload RPM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tardigrade-${{ needs.prepare-release.outputs.version }}-${{ matrix.arch }}.rpm
          path: dist/*.rpm
          if-no-files-found: error

      - name: Upload RPM SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-tardigrade-${{ needs.prepare-release.outputs.version }}-${{ matrix.arch }}.rpm
          path: sbom-tardigrade-${{ needs.prepare-release.outputs.version }}-${{ matrix.arch }}.rpm.spdx.json
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release assets
    needs:
      - prepare-release
      - build-release
      - build-deb
      - build-rpm
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \) -print0 | sort -z | xargs -0 shasum -a 256 > dist/tardigrade-checksums.txt

      - name: Scan release archives for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: dist/
          format: table
          severity: CRITICAL
          exit-code: 0

      - name: Generate release notes
        run: ./scripts/release-metadata.sh notes > release-notes.md

      - name: Publish release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: Tardigrade ${{ needs.prepare-release.outputs.tag }}
          body_path: release-notes.md
          files: |
            dist/*/*.tar.gz
            dist/*/*.deb
            dist/*/*.rpm
            dist/*/*.spdx.json
            dist/tardigrade-checksums.txt
          fail_on_unmatched_files: true
