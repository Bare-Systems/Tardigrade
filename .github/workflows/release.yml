name: Release Tardigrade

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # ── Prepare release ─────────────────────────────────────────────────────────
  # Skipped if triggered by workflow_run and CI did not succeed, ensuring
  # releases are never cut from a failing main.
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      should_publish: ${{ steps.meta.outputs.should_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(./scripts/release-metadata.sh version)"
          tag="$(./scripts/release-metadata.sh tag)"
          current_sha="${GITHUB_SHA}"
          should_publish="true"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "$tag")"
            if [ "$tag_commit" != "$current_sha" ]; then
              should_publish="false"
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" "$current_sha" -m "Tardigrade $tag"
            git push origin "$tag"
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "should_publish=$should_publish"
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          mkdir -p "$RUNNER_TEMP/release-notes"
          ./scripts/release-metadata.sh notes > "$RUNNER_TEMP/release-notes/release-notes.md"

      - name: Upload release notes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes
          path: ${{ runner.temp }}/release-notes/release-notes.md
          if-no-files-found: error
          retention-days: 1

  build-release:
    name: Build ${{ matrix.archive_name }}
    needs: prepare-release
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: tardigrade-linux-x86_64
          - os: ubuntu-24.04-arm
            archive_name: tardigrade-linux-aarch64
          - os: macos-15-intel
            archive_name: tardigrade-darwin-x86_64
          - os: macos-14
            archive_name: tardigrade-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Verify checkout is clean
        run: |
          git diff --exit-code
          git diff --cached --exit-code

      - name: Install Zig
        run: sh ./scripts/install-zig.sh 0.16.0

      - name: Print Zig version
        run: zig version

      - name: Prepare archive artifact paths
        id: archive_artifacts
        env:
          ARCHIVE_NAME: ${{ matrix.archive_name }}
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/release-artifacts/$ARCHIVE_NAME"
          mkdir -p "$artifact_dir"
          {
            echo "artifact_dir=$artifact_dir"
            echo "archive_path=$artifact_dir/$ARCHIVE_NAME.tar.gz"
            echo "sbom_path=$artifact_dir/sbom-$ARCHIVE_NAME.spdx.json"
          } >> "$GITHUB_OUTPUT"

      - name: Build release binary
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: zig build -Doptimize=ReleaseFast "-Dversion=$VERSION"

      - name: Package artifact
        env:
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          ARTIFACT_DIR: ${{ steps.archive_artifacts.outputs.artifact_dir }}
        run: |
          ./scripts/package-release-archive.sh \
            --archive-name "$ARCHIVE_NAME" \
            --binary zig-out/bin/tardigrade \
            --staging-dir dist \
            --output-dir "$ARTIFACT_DIR"

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          path: ${{ steps.archive_artifacts.outputs.artifact_dir }}
          artifact-name: sbom-${{ matrix.archive_name }}.spdx.json
          format: spdx-json
          output-file: ${{ steps.archive_artifacts.outputs.sbom_path }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ steps.archive_artifacts.outputs.archive_path }}

      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ steps.archive_artifacts.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 1

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.archive_name }}
          path: ${{ steps.archive_artifacts.outputs.sbom_path }}
          if-no-files-found: error
          retention-days: 1

  build-deb:
    name: Build DEB packages
    needs:
      - prepare-release
      - build-release
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            artifact: tardigrade-linux-x86_64
          - arch: arm64
            artifact: tardigrade-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download binary artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact

      - name: Extract binary
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          tar -xzf "artifact/${ARTIFACT}.tar.gz"
          chmod +x tardigrade

      - name: Build DEB
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p zig-out/bin
          cp tardigrade zig-out/bin/tardigrade
          ./packaging/deb/build.sh \
            --version "$VERSION" \
            --arch "$ARCH" \
            --binary zig-out/bin/tardigrade

      - name: Prepare DEB artifact paths
        id: deb_artifacts
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/deb-artifacts/$ARCH"
          mkdir -p "$artifact_dir"
          {
            echo "artifact_dir=$artifact_dir"
            echo "package_path=$artifact_dir/tardigrade_${VERSION}_${ARCH}.deb"
            echo "sbom_path=$artifact_dir/sbom-tardigrade_${VERSION}_${ARCH}.spdx.json"
          } >> "$GITHUB_OUTPUT"

      - name: Generate DEB SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          path: dist/
          artifact-name: sbom-tardigrade_${{ needs.prepare-release.outputs.version }}_${{ matrix.arch }}.spdx.json
          format: spdx-json
          output-file: ${{ steps.deb_artifacts.outputs.sbom_path }}

      - name: Stage DEB artifact
        env:
          PACKAGE_PATH: ${{ steps.deb_artifacts.outputs.package_path }}
        run: |
          set -euo pipefail
          package="$(find dist -maxdepth 1 -type f -name '*.deb' -print)"
          if [ "$(printf '%s\n' "$package" | sed '/^$/d' | wc -l)" -ne 1 ]; then
            echo "expected exactly one DEB package in dist/" >&2
            printf '%s\n' "$package" >&2
            exit 1
          fi
          cp "$package" "$PACKAGE_PATH"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tardigrade_${{ needs.prepare-release.outputs.version }}_${{ matrix.arch }}.deb
          path: ${{ steps.deb_artifacts.outputs.package_path }}
          if-no-files-found: error
          retention-days: 1

      - name: Upload DEB SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-tardigrade_${{ needs.prepare-release.outputs.version }}_${{ matrix.arch }}
          path: ${{ steps.deb_artifacts.outputs.sbom_path }}
          if-no-files-found: error
          retention-days: 1

  build-rpm:
    name: Build RPM packages
    needs:
      - prepare-release
      - build-release
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            artifact: tardigrade-linux-x86_64
          - arch: arm64
            artifact: tardigrade-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install rpm-build
        run: sudo apt-get install -y rpm-build

      - name: Download binary artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact

      - name: Extract binary
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          tar -xzf "artifact/${ARTIFACT}.tar.gz"
          chmod +x tardigrade

      - name: Build RPM
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p zig-out/bin
          cp tardigrade zig-out/bin/tardigrade
          ./packaging/rpm/build.sh \
            --version "$VERSION" \
            --arch "$ARCH" \
            --binary zig-out/bin/tardigrade

      - name: Prepare RPM artifact paths
        id: rpm_artifacts
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/rpm-artifacts/$ARCH"
          mkdir -p "$artifact_dir"
          {
            echo "artifact_dir=$artifact_dir"
            echo "package_path=$artifact_dir/tardigrade-${VERSION}-${ARCH}.rpm"
            echo "sbom_path=$artifact_dir/sbom-tardigrade-${VERSION}-${ARCH}.rpm.spdx.json"
          } >> "$GITHUB_OUTPUT"

      - name: Generate RPM SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          path: dist/
          artifact-name: sbom-tardigrade-${{ needs.prepare-release.outputs.version }}-${{ matrix.arch }}.rpm.spdx.json
          format: spdx-json
          output-file: ${{ steps.rpm_artifacts.outputs.sbom_path }}

      - name: Stage RPM artifact
        env:
          PACKAGE_PATH: ${{ steps.rpm_artifacts.outputs.package_path }}
        run: |
          set -euo pipefail
          package="$(find dist -maxdepth 1 -type f -name '*.rpm' -print)"
          if [ "$(printf '%s\n' "$package" | sed '/^$/d' | wc -l)" -ne 1 ]; then
            echo "expected exactly one RPM package in dist/" >&2
            printf '%s\n' "$package" >&2
            exit 1
          fi
          cp "$package" "$PACKAGE_PATH"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tardigrade-${{ needs.prepare-release.outputs.version }}-${{ matrix.arch }}.rpm
          path: ${{ steps.rpm_artifacts.outputs.package_path }}
          if-no-files-found: error
          retention-days: 1

      - name: Upload RPM SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-tardigrade-${{ needs.prepare-release.outputs.version }}-${{ matrix.arch }}.rpm
          path: ${{ steps.rpm_artifacts.outputs.sbom_path }}
          if-no-files-found: error
          retention-days: 1

  publish-release:
    name: Publish GitHub release assets
    needs:
      - prepare-release
      - build-release
      - build-deb
      - build-rpm
    if: needs.prepare-release.result == 'success' && needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download release notes
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-notes
          path: ${{ runner.temp }}/publish-release/release-notes

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: ${{ runner.temp }}/publish-release/dist
          pattern: 'tardigrade*,sbom*'
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        env:
          DIST_DIR: ${{ runner.temp }}/publish-release/dist
        run: |
          set -euo pipefail
          install -m 0755 scripts/install.sh "$DIST_DIR/install.sh"
          find "$DIST_DIR" -type f \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' -o -name 'install.sh' \) -print0 | sort -z | xargs -0 sha256sum > "$DIST_DIR/tardigrade-checksums.txt"

      - name: Verify checksums
        env:
          CHECKSUMS_PATH: ${{ runner.temp }}/publish-release/dist/tardigrade-checksums.txt
        run: sha256sum --check "$CHECKSUMS_PATH"

      - name: Scan release archives for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ runner.temp }}/publish-release/dist/
          format: table
          severity: CRITICAL
          exit-code: 0

      - name: Publish release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: Tardigrade ${{ needs.prepare-release.outputs.tag }}
          body_path: ${{ runner.temp }}/publish-release/release-notes/release-notes.md
          files: |
            ${{ runner.temp }}/publish-release/dist/*.tar.gz
            ${{ runner.temp }}/publish-release/dist/*.deb
            ${{ runner.temp }}/publish-release/dist/*.rpm
            ${{ runner.temp }}/publish-release/dist/*.spdx.json
            ${{ runner.temp }}/publish-release/dist/install.sh
            ${{ runner.temp }}/publish-release/dist/tardigrade-checksums.txt
          fail_on_unmatched_files: true
