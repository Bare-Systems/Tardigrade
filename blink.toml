[blink]
version = "1"

# ── Target ────────────────────────────────────────────────────────────────────

[targets.homelab]
type         = "ssh"
host         = "beelink"
user         = "admin"
base         = "/home/admin/barelabs"
runtime_dir  = "/home/admin/barelabs/runtime/tardigrade-build"
publish_host = "192.168.86.53"

# ═══════════════════════════════════════════════════════════════════════════════
# tardigrade — edge gateway / reverse proxy for the Bare Systems homelab
# Binary:  /home/admin/barelabs/runtime/blink-homelab/bin/tardigrade
# Service: systemd user service (tardigrade.service)
# Port:    8443 SSL (iptables redirects 443 → 8443 for LAN traffic)
# Network contract:
#   - Tardigrade is the public edge
#   - BearClaw remains loopback-only on 127.0.0.1:3001
#   - preserve Host / X-Forwarded-Proto when proxying to BearClaw
# ═══════════════════════════════════════════════════════════════════════════════

[services.tardigrade]
description  = "Tardigrade - edge gateway / reverse proxy"
service_name = "tardigrade"

# ── Source: bundle the Zig source as a tarball for upload ─────────────────────

[services.tardigrade.source]
type     = "containerized_local_build"
image    = "alpine:3.20"
mount    = ".:/workspace"
workdir  = "/workspace"
command  = "mkdir -p dist && tar -czf dist/tardigrade-src.tgz --exclude=.git --exclude=.github --exclude=.blink --exclude=.zig-cache --exclude=zig-out --exclude=dist ."
artifact = "dist/tardigrade-src.tgz"

# ── Pipeline ──────────────────────────────────────────────────────────────────
# Order:
#   1. fetch_artifact — tarball source locally
#   2. provision      — create dirs on blink
#   3. install        — upload tarball to blink staging
#   4. remote_script  — install Zig (if needed) + compile binary
#   5. stop           — backup current binary + stop service
#   6. start          — copy new binary into place + start service
#   7. health_check   — wait for port 8443 to respond
#   8. verify         — smoke test TLS + health endpoint

[services.tardigrade.deploy]
target            = "homelab"
pipeline          = ["fetch_artifact", "provision", "install", "remote_script", "stop", "start", "health_check", "verify"]
rollback_pipeline = ["stop", "shell", "health_check"]

# ── Provision: create runtime dirs ───────────────────────────────────────────

[services.tardigrade.provision]
dirs = [
  "{{runtime_dir}}/staging",
  "{{runtime_dir}}/build",
  "{{runtime_dir}}/backup",
]

# ── Install: upload source tarball to blink staging ──────────────────────────

[services.tardigrade.install]
dest = "runtime/tardigrade-build/staging/tardigrade-src.tgz"

# ── Remote script: install Zig (if needed) + compile binary ──────────────────

[services.tardigrade.remote_script]
path = "deploy/blink/build_tardigrade.sh"

# ── Stop: backup current binary + stop service ───────────────────────────────

[services.tardigrade.stop]
command = "cp /home/admin/barelabs/runtime/blink-homelab/bin/tardigrade {{runtime_dir}}/backup/tardigrade.bak 2>/dev/null || true && systemctl --user stop tardigrade.service 2>/dev/null || true"

# ── Start: copy compiled binary into place + start service ───────────────────

[services.tardigrade.start]
command = "grep -q '^TARDIGRADE_TLS_DYNAMIC_RELOAD_INTERVAL_MS=' /home/admin/barelabs/runtime/blink-homelab/tardigrade.env && sed -i 's/^TARDIGRADE_TLS_DYNAMIC_RELOAD_INTERVAL_MS=.*/TARDIGRADE_TLS_DYNAMIC_RELOAD_INTERVAL_MS=0/' /home/admin/barelabs/runtime/blink-homelab/tardigrade.env || printf '\nTARDIGRADE_TLS_DYNAMIC_RELOAD_INTERVAL_MS=0\n' >> /home/admin/barelabs/runtime/blink-homelab/tardigrade.env && perl -0pi -e 's/server_name 192\\.168\\.86\\.53 bearclaw\\.home blink\\.home tardigrade\\.home;/server_name 192.168.86.53 127.0.0.1 localhost bearclaw.home blink.home tardigrade.home;/g' /home/admin/barelabs/runtime/blink-homelab/tardigrade.conf && cp {{runtime_dir}}/build/zig-out/bin/tardigrade /home/admin/barelabs/runtime/blink-homelab/bin/tardigrade && chmod +x /home/admin/barelabs/runtime/blink-homelab/bin/tardigrade && systemctl --user start tardigrade.service"

# ── Shell: used in rollback pipeline to restore the backup binary ─────────────

[services.tardigrade.shell]
command = "grep -q '^TARDIGRADE_TLS_DYNAMIC_RELOAD_INTERVAL_MS=' /home/admin/barelabs/runtime/blink-homelab/tardigrade.env && sed -i 's/^TARDIGRADE_TLS_DYNAMIC_RELOAD_INTERVAL_MS=.*/TARDIGRADE_TLS_DYNAMIC_RELOAD_INTERVAL_MS=0/' /home/admin/barelabs/runtime/blink-homelab/tardigrade.env || printf '\nTARDIGRADE_TLS_DYNAMIC_RELOAD_INTERVAL_MS=0\n' >> /home/admin/barelabs/runtime/blink-homelab/tardigrade.env && perl -0pi -e 's/server_name 192\\.168\\.86\\.53 bearclaw\\.home blink\\.home tardigrade\\.home;/server_name 192.168.86.53 127.0.0.1 localhost bearclaw.home blink.home tardigrade.home;/g' /home/admin/barelabs/runtime/blink-homelab/tardigrade.conf && cp {{runtime_dir}}/backup/tardigrade.bak /home/admin/barelabs/runtime/blink-homelab/bin/tardigrade && chmod +x /home/admin/barelabs/runtime/blink-homelab/bin/tardigrade && systemctl --user start tardigrade.service"

# ── Health check ──────────────────────────────────────────────────────────────

[services.tardigrade.health_check]
url      = "https://127.0.0.1:8443/health"
timeout  = 30
interval = 2
insecure = true
http_version = "1.1"

# ── Verify ────────────────────────────────────────────────────────────────────

[services.tardigrade.verify]
tags = ["smoke", "health"]

[services.tardigrade.verify.tests.health-endpoint]
type          = "shell"
command       = "ss -tln | grep -q ':8443' && grep -Eq '^location = /health \\{' /home/admin/barelabs/runtime/blink-homelab/tardigrade.conf && echo ready || echo missing"
expect_output = "ready"
tags          = ["smoke", "health"]

[services.tardigrade.verify.tests.service-running]
type          = "shell"
command       = "pgrep -fa '/home/admin/barelabs/runtime/blink-homelab/bin/tardigrade' >/dev/null && echo active || echo inactive"
expect_output = "active"
tags          = ["health"]

[services.tardigrade.verify.tests.port-listening]
type          = "shell"
command       = "ss -tlnp | grep -c ':8443'"
expect_output = "1"
tags          = ["health"]

[services.tardigrade.verify.tests.bearclaw-upstream-configured]
type          = "shell"
command       = "grep -Eq 'proxy_pass http://127\\.0\\.0\\.1:3001;' /home/admin/barelabs/runtime/blink-homelab/tardigrade.conf && echo configured || echo missing"
expect_output = "configured"
tags          = ["health"]

[services.tardigrade.verify.tests.bearclaw-host-header-preserved]
type          = "shell"
command       = "grep -Eq 'proxy_set_header Host \\$host;' /home/admin/barelabs/runtime/blink-homelab/tardigrade.conf && echo configured || echo missing"
expect_output = "configured"
tags          = ["health"]
