# Example BearClaw-facing Tardigrade deployment.
# Replace paths, hostnames, and ports before production use.

listen 443 ssl;
server_name api.example.com;

tls_cert_path /etc/tardigrade/tls/fullchain.pem;
tls_key_path /etc/tardigrade/tls/privkey.pem;

root /srv/bearclaw/public;
try_files $uri /index.html;

location = / {
    return 302 /index.html;
}

location = /health {
    return 200 ok;
}

location = /v1/chat {
    proxy_pass /v1/chat;
    auth required;
}

location = /v1/commands {
    proxy_pass /v1/commands;
    auth required;
}

# BearClaw edge prefix — strips /bearclaw and forwards to upstream.
# /bearclaw/health is public (no auth directive).
location = /bearclaw/health {
    proxy_pass /health;
}

# /bearclaw/v1/* → upstream /v1/* (bearer auth enforced by Tardigrade)
location /bearclaw/v1/ {
    proxy_pass /v1/;
    auth required;
}

# /bearclaw/transcripts* (bearer auth enforced by Tardigrade)
location /bearclaw/transcripts {
    proxy_pass /transcripts;
    auth required;
}

location /assets/ {
    root /srv/bearclaw/public;
}

location / {
    root /srv/bearclaw/public;
    try_files $uri /index.html;
    error_page 404 /errors/404.html;
}
